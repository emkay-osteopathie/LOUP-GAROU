<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Loup-Garou YOPI</title>
<link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <div class="container">
    <div class="top-nav">
      <span class="muted" id="nom-joueur">—</span>
      <span>
        <button id="btn-alertes" class="secondary" style="width:auto; padding:6px 12px; font-size:0.75rem; margin-right:8px;">🔔 Activer les alertes</button>
        <a href="regles.html">Règlements</a>
      </span>
    </div>

    <div class="moon-tracker" id="moon-tracker"></div>

    <div class="center" style="margin-bottom:14px;">
      <span class="badge" id="badge-phase">—</span>
    </div>

    <div class="card raised" id="statut-tour-card" style="display:none; text-align:center;">
      <p id="statut-tour-texte" style="margin:0; font-weight:600; color:var(--accent-moon);"></p>
      <p id="minuteur-loups-joueur" style="display:none; margin:6px 0 0; font-family:'JetBrains Mono', monospace; font-size:1.2rem; color:var(--accent-blood-bright);"></p>
    </div>

    <div class="card raised" id="horaire-card" style="border: 1px solid var(--accent-moon);">
      <h3 style="font-style:normal; color:var(--accent-moon); font-weight:600;">🕒 Horaire d'aujourd'hui</h3>
      <ul class="player-list" id="horaire-liste"></ul>
    </div>

    <div class="role-card" id="role-card">
      <div class="role-card-inner">
        <div class="role-face back">
          <div class="role-symbol">🌑</div>
          <p class="muted" style="margin:0;">Touche pour révéler ton rôle</p>
        </div>
        <div class="role-face front">
          <div class="role-symbol" id="role-symbole">?</div>
          <h2 id="role-label">—</h2>
          <p class="muted" id="role-statut" style="margin-top:6px;"></p>
        </div>
      </div>
    </div>

    <div class="card" id="complices-card" style="display:none;">
      <h3 style="font-style:normal; color:var(--text-primary);">🐺 Tes complices</h3>
      <ul class="player-list" id="complices-liste"></ul>
    </div>

    <div class="card" id="annonces-card" style="display:none;">
      <h3 style="font-style:normal; color:var(--text-primary);">Annonce</h3>
      <p id="annonces-texte" class="muted"></p>
    </div>

    <div id="zone-action"></div>

    <div class="card" id="etat-village-card" style="display:none;">
      <h3 style="font-style:normal; color:var(--text-primary);">État du village</h3>
      <ul class="player-list" id="etat-village-liste"></ul>
    </div>

    <div class="card" id="journal-joueur-card" style="display:none;">
      <h3 style="font-style:normal; color:var(--text-primary);">Journal de partie</h3>
      <div id="journal-joueur"></div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=2"></script>
  <script src="js/game.js?v=2"></script>
  <script src="js/joueur.js?v=2"></script>
</body>
</html>
